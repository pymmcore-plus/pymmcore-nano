name: Build wheels

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
    tags: [v*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build ${{ matrix.python }} on ${{ matrix.os }} ${{ matrix.macos_arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-latest]
        python: [cp39, cp310, cp311, cp312, cp313, cp314]
        include:
          - os: macos-15-intel
            macos_arch: "x86_64"
          - os: macos-latest
            macos_arch: "arm64"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          vsversion: "2022"
      - uses: astral-sh/setup-uv@v7
      - run: uv run --no-dev --group build scripts/extract_version.py --update

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2
        env:
          CIBW_BUILD: "${{ matrix.python }}-*"
          CIBW_ARCHS_MACOS: "${{ matrix.macos_arch }}"
          # Python on Linux is usually configured to add debug information,
          # which increases binary size by ~11-fold. Remove for the builds we
          # distribute.
          CIBW_ENVIRONMENT_LINUX: "LDFLAGS=-Wl,--strip-debug"

      - name: check-wheel-contents
        run: uvx check-wheel-contents ./wheelhouse

      - uses: actions/upload-artifact@v6
        with:
          name: artifact-wheels-${{ matrix.os }}-${{ matrix.macos_arch }}-${{ matrix.python }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - name: Build sdist
        run: |
          uv run --no-dev --group build scripts/extract_version.py --update
          uv build --sdist

      - uses: actions/upload-artifact@v6
        with:
          name: artifact-sdist
          path: dist/*.tar.gz

  publish:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # publish on every tag
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')

    # https://docs.pypi.org/trusted-publishers/
    permissions:
      id-token: write # for trusted publishing on PyPi
      contents: write # allows writing releases

    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: artifact-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "./dist/*"
